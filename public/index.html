<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movies Social Briefing</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; background:#faf8f5; color:#1f1f1f; margin:0; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px; }
    h1 { font-size: 34px; margin:0 0 10px; }
    .sub { color:#666; margin-bottom: 18px; }
    .card { background:#fff; border:1px solid #ece7e0; border-radius:10px; padding:16px; margin:14px 0; }
    .quote { background:#f5f3f0; border-left:3px solid #c7bfb2; padding:10px 12px; margin:8px 0; white-space:pre-wrap; }
    a { color:#0b57d0; }
    .muted { color:#777; font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>What are the most talked about movies on social media</h1>
    <p class="sub">Primary-source driven briefing. Verbatim text + links.</p>

    <div class="card">
      <h2>Top things FilmTwitter is following right now</h2>
      <div id="tops"></div>
    </div>

    <div class="card">
      <h2>Specific viral or high-engagement posts (verbatim)</h2>
      <div id="posts"></div>
    </div>

    <p class="muted">API: <a href="/api/sources">/api/sources</a> • Dataset: <a href="/sources.json">/sources.json</a></p>
  </div>

<script>
(async function(){
  const data = await (await fetch('/sources.json')).json();
  const tops = document.getElementById('tops');
  data.topThingsFilmTwitterFollowing.forEach((item) => {
    const el = document.createElement('div');
    el.className = 'quote';
    el.innerHTML = `<strong>${item.topic}</strong>\n${item.verbatim}\n<a href="${item.sourceUrl}" target="_blank">Primary source link</a>`;
    tops.appendChild(el);
  });

  const posts = document.getElementById('posts');
  data.viralPosts.forEach((p) => {
    const el = document.createElement('div');
    el.className = 'quote';
    el.innerHTML = `<div><strong>${p.cluster}</strong></div><div>${p.verbatim}</div><div class="muted">${p.engagementNote || ''}</div><a href="${p.sourceUrl}" target="_blank">Primary source link</a>`;
    posts.appendChild(el);
  });
})();
</script>
</body>
</html>
